apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pod-mutator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "pod-mutator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - {{ include "pod-mutator.fullname" . }}-certs
    verbs:
      - get
      - update
      - patch
{{- if .Values.leaderElection.enabled }}
  - apiGroups:
      - "coordination.k8s.io"
    resources:
      - leases
    verbs:
      - create
      - list
  - apiGroups:
      - "coordination.k8s.io"
    resources:
      - leases
    resourceNames:
      - {{ .Values.leaderElection.leaseName }}
    verbs:
      - get
      - watch
      - update
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
  - apiGroups:
      - "discovery.k8s.io"
    resources:
      - endpointslices
    verbs:
      - list
      - watch
      - create
  - apiGroups:
      - "discovery.k8s.io"
    resources:
      - endpointslices
    resourceNames:
      - {{ include "pod-mutator.fullname" . }}-leader
    verbs:
      - get
      - update
      - patch
{{- end }}
