apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-mutator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pod-mutator.labels" . | nindent 4 }}
  {{ if .Values.commonAnnotations -}}
  annotations:
    {{- include "pod-mutator.annotations" . | nindent 4 }}
  {{- end }}
data:
  # Prefer umbrella/global API URL override, then fall back to chart-local values.
  {{- if (coalesce (dig "castai" "apiURL" "" .Values.global) .Values.castai.apiUrl .Values.castai.apiURL) }}
  API_URL: {{ (coalesce (dig "castai" "apiURL" "" .Values.global) .Values.castai.apiUrl .Values.castai.apiURL) | quote }}
  {{- else if not .Values.envFrom }}
  {{- fail "castai.apiUrl or envFrom must be provided" }}
  {{- end }}
  {{- if not .Values.castai.clusterIdSecretKeyRef.name }}
  {{- if .Values.castai.clusterID }}
  CLUSTER_ID: {{ .Values.castai.clusterID | quote }}
  {{- else if not .Values.envFrom }}
  {{- fail "clusterID or envFrom must be provided" }}
  {{- end }}
  {{- end }}
