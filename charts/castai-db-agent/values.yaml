# -- Token to be used for authorizing access to the CAST AI API.
apiKey: ""
# -- URL to the CAST AI API endpoint.
apiURL: ""
image:
  repository: us-docker.pkg.dev/castai-hub/library/db-agent
  pullPolicy: IfNotPresent
  tag: ""  # uses values from _versions.tpl for default value
logLevel: info
organizationID: ""
cacheGroupID: ""
database:
  host: ""
  port: 5432
  # -- Username for database authentication. For IAM auth, use the format: "service-account-name@project-id.iam"
  username: ""
  # -- Password for database authentication (not required when useIAMAuth is true)
  password: ""
  # -- Name of secret with database credentials (username and password). Not required when using useIAMAuth with inline username.
  credentialsSecretRef: ""
  # -- Enable IAM authentication for database connection (GCP Cloud SQL IAM). Requires Workload Identity setup. See IAM_AUTH_SETUP.md for details.
  useIAMAuth: false
  # -- Database protocol to use. Supported values: postgres, mysql.
  protocol: postgres
# -- URL to the CAST AI API gRPC endpoint.
gRPCEndpoint: ""
collectors:
  indexes:
    # -- Frequency in which existing indexes are collected
    runsEvery: 15m
  metadata:
    # -- Frequency in which table metadata is collected
    runsEvery: 15m
  queries:
    # -- Frequency in which query statistics are collected
    runsEvery: 15m
  # -- Comma-separated list of schemas to exclude from collection (optional)
  excludedSchemas: ""
  # -- Comma-separated list of databases to exclude from database auto-discovery (optional)
  excludedDatabases: ""
cloudSqlProxy:
  # -- Enable Cloud SQL Proxy sidecar for GCP Cloud SQL connections
  enabled: false
  # -- Have the proxy connect over private IP if connecting from a VPC-native GKE cluster
  privateIp: false
  # -- Have the proxy connect with Automatic IAM authentication
  autoIamAuthn: true
  # -- Port on which Cloud SQL Proxy will listen
  port: 5432

cloudSqlProxyImage:
  repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
  pullPolicy: IfNotPresent
  tag: ""  # uses values from _versions.tpl for default value
