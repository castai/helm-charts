apiVersion: v1
kind: Service
metadata:
  name: {{ include "castai-db-optimizer.name" . }}
  labels:
    {{- include "castai-db-optimizer.labels" . | nindent 4 }}
  annotations:
    {{- include "castai-db-optimizer.annotations" . | nindent 4 }}
spec:
  {{- with .Values.service.trafficDistribution }}
  trafficDistribution: {{ . }}
  {{- end }}
  ports:
    {{- range $index, $endpoint := .Values.endpoints}}
    {{- if empty $endpoint.name }}
    - name: endpoint-{{$index}}
      port: {{$endpoint.servicePort}} # exposed service port ->
      targetPort: {{$endpoint.port}} # -> port to DBO Proxy pod
      protocol: TCP
      {{- if eq $.Values.protocol "MySQL" }}
      appProtocol: mysql
      {{- else if eq $.Values.protocol "PostgreSQL" }}
      appProtocol: postgresql
      {{- end }}
    {{- end }}
    {{- end }}
    - name: grpc
      port: 9050
      targetPort: grpc
      protocol: TCP
    - name: qp-metrics
      port: 2112
      targetPort: qp-metrics
      protocol: TCP
    - name: proxy-metrics
      port: 9901
      targetPort: proxy-metrics
      protocol: TCP
  selector:
    {{- include "castai-db-optimizer.selectorLabels" . | nindent 4 }}


# for each named port, define a named service
{{- range $index, $endpoint := .Values.endpoints}}
{{- if not ( empty $endpoint.name ) }}
---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "castai-db-optimizer.name" $ }}-{{$endpoint.name}}
  labels:
    {{- include "castai-db-optimizer.labels" $ | nindent 4 }}
  annotations:
    {{- include "castai-db-optimizer.annotations" $ | nindent 4 }}
spec:
  {{- with $.Values.service.trafficDistribution }}
  trafficDistribution: {{ . }}
  {{- end }}
  ports:
    - name: endpoint
      port: {{$endpoint.servicePort}} # exposed service port ->
      targetPort: {{$endpoint.port}} # -> port to DBO Proxy pod
      protocol: TCP
      {{- if eq $.Values.protocol "MySQL" }}
      appProtocol: mysql
      {{- else if eq $.Values.protocol "PostgreSQL" }}
      appProtocol: postgresql
      {{- end }}
  selector:
    {{- include "castai-db-optimizer.selectorLabels" $ | nindent 4 }}

{{- end }}
{{- end }}
