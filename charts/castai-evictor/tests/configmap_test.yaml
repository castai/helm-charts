suite: ConfigMap rendering
templates:
  - configmap-static.yaml

tests:
  - it: renders empty config.yaml when customConfig is default empty map
    asserts:
      - isNullOrEmpty:
          path: 'data["config.yaml"]'

  - it: renders legacy string directly into config.yaml
    set:
      customConfig: |
        evictionConfig:
          - nodeSelector:
              labelSelector:
                matchLabels:
                  app: test
            settings:
              removalDisabled:
                enabled: true
    asserts:
      - matchRegex:
          path: 'data["config.yaml"]'
          pattern: "evictionConfig:"
      - matchRegex:
          path: 'data["config.yaml"]'
          pattern: "removalDisabled:"

  - it: wraps structured slice in evictionConfig
    set:
      customConfig:
        - nodeSelector:
            labelSelector:
              matchLabels:
                app: test
          settings:
            removalDisabled:
              enabled: true
    asserts:
      - matchRegex:
          path: 'data["config.yaml"]'
          pattern: "evictionConfig:"
      - matchRegex:
          path: 'data["config.yaml"]'
          pattern: "removalDisabled:"

  - it: wraps map.evictionRules in evictionConfig
    set:
      customConfig:
        evictionRules:
          - nodeSelector:
              labelSelector:
                matchLabels:
                  app: test
            settings:
              removalDisabled:
                enabled: true
    asserts:
      - matchRegex:
          path: 'data["config.yaml"]'
          pattern: "evictionConfig:"
      - matchRegex:
          path: 'data["config.yaml"]'
          pattern: "removalDisabled:"
