---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
    controller-gen.kubebuilder.io/version: v0.20.1
  name: evictorconfigs.autoscaling.cast.ai
spec:
  group: autoscaling.cast.ai
  names:
    kind: EvictorConfig
    listKind: EvictorConfigList
    plural: evictorconfigs
    singular: evictorconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .spec.config.dryRun
      name: DryRun
      type: boolean
    - jsonPath: .spec.config.scopedMode
      name: ScopedMode
      type: boolean
    - jsonPath: .spec.config.cycleInterval
      name: CycleInterval
      type: string
    - jsonPath: .spec.managementMode
      name: ManagementMode
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          EvictorConfig is a cluster-scoped singleton CR that holds all evictor runtime configuration.
          The evictor watches this resource and applies changes immediately without restart.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EvictorConfigSpec holds all evictor configuration.
              The spec is split into four fields:
                - managementMode: who owns this config (CAST AI platform or self-managed).
                - enabled: top-level kill-switch for the evictor.
                - config: functional runtime knobs, reconciled by the CAST AI platform on every
                  snapshot sync in managed mode, applied as-is in self-managed mode.
                - evictionRules: advanced per-workload/per-node eviction rules, always customer-managed.
            properties:
              config:
                description: |-
                  Config holds all functional runtime configuration knobs.
                  In managed mode these are reconciled by the CAST AI platform on every snapshot sync.
                  In self-managed mode they are applied as-is from this CR.
                properties:
                  aggressiveMode:
                    description: |-
                      AggressiveMode targets every eligible pod and node, including single-replica
                      workloads and Jobs that are normally skipped in default mode.
                    type: boolean
                  arm64Supported:
                    description: |-
                      Arm64Supported indicates arm64 nodes are present so the scheduling simulation
                      includes them as valid bin-packing targets.
                    type: boolean
                  cleanupKarpenterNodes:
                    description: |-
                      CleanupKarpenterNodes deletes the Karpenter NodeClaim after draining a
                      Karpenter-managed node, triggering faster node removal.
                    type: boolean
                  cycleInterval:
                    description: CycleInterval is the time between consecutive evictor
                      cycles (e.g. "1m").
                    pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|μs|ms|s|m|h))+$
                    type: string
                  drainRollbackTimeout:
                    description: |-
                      DrainRollbackTimeout is how long the evictor waits before rolling back a cordon
                      when a drain attempt fails (e.g. "1m").
                    pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|μs|ms|s|m|h))+$
                    type: string
                  drainTimeout:
                    description: |-
                      DrainTimeout is the maximum time the evictor waits for a node to fully drain
                      before giving up (e.g. "10m").
                    pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|μs|ms|s|m|h))+$
                    type: string
                  dryRun:
                    description: |-
                      DryRun puts the evictor in simulation mode: all decisions are logged but no
                      evictions, cordons, or soft taints are applied.
                    type: boolean
                  emitNodeRelatedPodEvents:
                    description: |-
                      EmitNodeRelatedPodEvents emits Kubernetes events on pods when they are evicted
                      as part of a node drain.
                    type: boolean
                  forceDisableKarpenterMode:
                    description: |-
                      ForceDisableKarpenterMode disables Karpenter-aware scheduling simulation even
                      when Karpenter is detected on the cluster.
                    type: boolean
                  forceDisableLiveMigration:
                    description: |-
                      ForceDisableLiveMigration disables LIVE pod migration even when the cluster
                      capability is detected. By default, live migration is used when available.
                    type: boolean
                  forceDisablePodMutations:
                    description: |-
                      ForceDisablePodMutations disables PodMutation CR application during scheduling
                      simulation even when the cluster capability is detected.
                    type: boolean
                  forceDisableWOOP:
                    description: |-
                      ForceDisableWOOP disables WOOP scheduling recommendations even when the cluster
                      capability is detected. By default, WOOP is used when available.
                    type: boolean
                  ignorePodDisruptionBudgets:
                    description: |-
                      IgnorePodDisruptionBudgets disables PDB checks during eviction.
                      Use with caution: this may violate availability guarantees for production workloads.
                    type: boolean
                  maxTargetNodesPerCycle:
                    description: MaxTargetNodesPerCycle is the upper bound on nodes
                      drained in a single cycle.
                    format: int32
                    type: integer
                  minTargetNodesPerCycle:
                    description: MinTargetNodesPerCycle is the lower bound on nodes
                      considered per cycle.
                    format: int32
                    type: integer
                  nodeGracePeriodMinutes:
                    description: |-
                      NodeGracePeriodMinutes is the minimum time a node must be underutilized before
                      the evictor considers it a drain candidate.
                    format: int32
                    type: integer
                  podEvictionFailureBackOff:
                    description: |-
                      PodEvictionFailureBackOff is the wait time before retrying after a pod eviction
                      request fails (e.g. "5s").
                    pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|μs|ms|s|m|h))+$
                    type: string
                  pricingAwarenessEnabled:
                    description: |-
                      PricingAwarenessEnabled makes the evictor factor node cost into drain candidate
                      selection, preferring to drain more expensive nodes first.
                    type: boolean
                  pricingModel:
                    description: |-
                      PricingModel overrides the default cost coefficients used when pricingAwarenessEnabled
                      is true. Zero values fall back to built-in defaults.
                    properties:
                      baseCPUCost:
                        anyOf:
                        - type: integer
                        - type: string
                        description: BaseCPUCost is the cost coefficient per CPU core
                          used in node price estimation.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      baseMemCost:
                        anyOf:
                        - type: integer
                        - type: string
                        description: BaseMemCost is the cost coefficient per GiB of
                          memory used in node price estimation.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      spotDiscount:
                        anyOf:
                        - type: integer
                        - type: string
                        description: |-
                          SpotDiscount is the fractional discount applied to spot instance price
                          relative to on-demand (e.g. 0.5 means spot is 50% cheaper).
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    required:
                    - baseCPUCost
                    - baseMemCost
                    - spotDiscount
                    type: object
                  scopedMode:
                    description: |-
                      ScopedMode restricts the evictor to nodes carrying the
                      provisioner.cast.ai/managed-by=cast.ai label (CAST AI-provisioned nodes only).
                    type: boolean
                  softTainting:
                    description: |-
                      SoftTainting applies a PreferNoSchedule taint (evictor.cast.ai/evicted) to drain
                      candidates instead of hard-cordoning them, allowing the scheduler to prefer other
                      nodes without fully blocking new pods.
                    type: boolean
                  targetAllNodes:
                    description: |-
                      TargetAllNodes makes the evictor consider all nodes in the cluster as eviction
                      candidates, not just CAST AI-provisioned ones.
                    type: boolean
                  targetNodePercentage:
                    description: |-
                      TargetNodePercentage is the percentage of eligible nodes to consider per cycle,
                      applied after minTargetNodesPerCycle and maxTargetNodesPerCycle bounds.
                    format: int32
                    type: integer
                  windows:
                    description: Windows enables eviction of pods and nodes running
                      Windows workloads.
                    type: boolean
                required:
                - aggressiveMode
                - arm64Supported
                - cleanupKarpenterNodes
                - cycleInterval
                - drainRollbackTimeout
                - drainTimeout
                - dryRun
                - emitNodeRelatedPodEvents
                - forceDisableKarpenterMode
                - forceDisableLiveMigration
                - forceDisablePodMutations
                - forceDisableWOOP
                - ignorePodDisruptionBudgets
                - maxTargetNodesPerCycle
                - minTargetNodesPerCycle
                - nodeGracePeriodMinutes
                - podEvictionFailureBackOff
                - pricingAwarenessEnabled
                - pricingModel
                - scopedMode
                - softTainting
                - targetAllNodes
                - targetNodePercentage
                - windows
                type: object
              enabled:
                description: |-
                  Enabled is the top-level kill-switch for the evictor.
                  When false, no evictions or node drains are performed regardless of other settings.
                type: boolean
              evictionRules:
                description: |-
                  EvictionRules holds advanced per-workload and per-node eviction rules
                  ("Advanced configuration" in the CAST AI UI).
                  Each rule targets either pods (via podSelector) or nodes (via nodeSelector) — exactly one must be set.
                  These rules are always customer-managed regardless of managementMode.
                items:
                  description: EvictionRule is one advanced eviction rule that pairs
                    a selector with behavioral overrides.
                  properties:
                    nodeSelector:
                      description: |-
                        NodeSelector targets nodes matching the given label selector.
                        Mutually exclusive with podSelector.
                      properties:
                        labelSelector:
                          description: LabelSelector restricts matching to nodes whose
                            labels satisfy this selector.
                          properties:
                            matchExpressions:
                              description: MatchExpressions is a list of label selector
                                requirements.
                              items:
                                description: EvictionLabelSelectorRequirement is a
                                  label selector requirement with a key, operator,
                                  and values.
                                properties:
                                  key:
                                    description: Key is the label key the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      Operator represents the key's relationship to the value set.
                                      Valid operators are In, NotIn, Exists, DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      Values is an array of string values.
                                      Required for In and NotIn operators; must be empty for Exists and DoesNotExist.
                                    items:
                                      type: string
                                    type: array
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: MatchLabels is a map of key-value pairs
                                that must all be present on the node labels.
                              type: object
                          type: object
                      type: object
                    podSelector:
                      description: |-
                        PodSelector targets pods matching the given criteria.
                        Mutually exclusive with nodeSelector.
                      properties:
                        kind:
                          description: Kind restricts matching to pods owned by a
                            specific kind (e.g. Deployment, StatefulSet, Job).
                          type: string
                        labelSelector:
                          description: LabelSelector restricts matching to pods whose
                            labels satisfy this selector.
                          properties:
                            matchExpressions:
                              description: MatchExpressions is a list of label selector
                                requirements.
                              items:
                                description: EvictionLabelSelectorRequirement is a
                                  label selector requirement with a key, operator,
                                  and values.
                                properties:
                                  key:
                                    description: Key is the label key the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      Operator represents the key's relationship to the value set.
                                      Valid operators are In, NotIn, Exists, DoesNotExist.
                                    type: string
                                  values:
                                    description: |-
                                      Values is an array of string values.
                                      Required for In and NotIn operators; must be empty for Exists and DoesNotExist.
                                    items:
                                      type: string
                                    type: array
                                required:
                                - key
                                - operator
                                type: object
                              type: array
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: MatchLabels is a map of key-value pairs
                                that must all be present on the pod labels.
                              type: object
                          type: object
                        namespace:
                          description: Namespace restricts matching to a specific
                            namespace. Omit to match all namespaces.
                          type: string
                        replicasMin:
                          description: ReplicasMin restricts matching to workloads
                            with at least this many replicas.
                          format: int32
                          type: integer
                      type: object
                    settings:
                      description: Settings defines the eviction behavior applied
                        to matched pods or nodes.
                      properties:
                        aggressive:
                          description: |-
                            Aggressive applies aggressive-mode eviction to matched pods, overriding the
                            global aggressiveMode setting for this selector only.
                          type: boolean
                        disposable:
                          description: |-
                            Disposable marks matched pods as evictable regardless of other protection rules
                            (e.g. StatefulSet membership, single-replica guard).
                            Equivalent to the autoscaling.cast.ai/disposable="true" annotation.
                          type: boolean
                        removalDisabled:
                          description: |-
                            RemovalDisabled prevents the evictor from evicting matched pods or draining matched nodes.
                            Equivalent to the autoscaling.cast.ai/removal-disabled="true" annotation.
                          type: boolean
                      type: object
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of podSelector or nodeSelector must be set
                    rule: (has(self.podSelector) && !has(self.nodeSelector)) || (!has(self.podSelector)
                      && has(self.nodeSelector))
                type: array
              managementMode:
                description: |-
                  ManagementMode controls who reconciles this CR.
                  "castai" means the CAST AI platform owns it and overwrites diverging fields on every snapshot sync.
                  "self-managed" means the cluster operator owns it; the UI displays settings as read-only.
                enum:
                - castai
                - self-managed
                type: string
            required:
            - config
            - enabled
            - managementMode
            type: object
          status:
            description: EvictorConfigStatus reports the evictor's view of this CR.
            properties:
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last processed
                  by the evictor.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
