{{/* ── Collect enabled tags ─────────────────────────────────────────────────── */}}
{{- $enabledTags := list }}
{{- range $tag := list "readonly" "node-autoscaler" "workload-autoscaler" "full" "autoscaler-anywhere" "autoscaler-openshift" }}
{{- if index $.Values.tags $tag }}
{{- $enabledTags = append $enabledTags $tag }}
{{- end }}
{{- end }}

{{/* ── Mutual exclusivity ───────────────────────────────────────────────────── */}}
{{- if gt (len $enabledTags) 1 }}
{{ fail (printf "only one mode tag may be enabled at a time; got: %s" (join ", " $enabledTags)) }}
{{- end }}

{{/* ── Required values when a mode tag is set ─────────────────────────────── */}}
{{- if $enabledTags }}
{{- $hasApiKey := .Values.global.castai.apiKey }}
{{- $hasSecretRef := not (empty .Values.global.castai.apiKeySecretRef) }}
{{/* apiKey + the default "castai-credentials" is fine — apiKey creates that secret.
     Only a custom ref name conflicts with apiKey. */}}
{{- $hasCustomSecretRef := and $hasSecretRef (ne .Values.global.castai.apiKeySecretRef "castai-credentials") }}
{{- if and (not $hasApiKey) (not $hasSecretRef) }}
{{ fail "Either global.castai.apiKey or global.castai.apiKeySecretRef is required when enabling a mode tag" }}
{{- end }}
{{- if and $hasApiKey $hasCustomSecretRef }}
{{ fail "global.castai.apiKey and global.castai.apiKeySecretRef are mutually exclusive" }}
{{- end }}
{{- $modeTag := index $enabledTags 0 }}
{{- if and (ne $modeTag "autoscaler-anywhere") (ne $modeTag "autoscaler-openshift") }}
{{- if not .Values.global.castai.provider }}
{{ fail "global.castai.provider is required when enabling a mode tag (eks, aks, gke, kops)" }}
{{- end }}
{{- end }}
{{- end }}

{{/* ── autoscaler-anywhere specific validation ──────────────────────────────── */}}
{{- if index $.Values.tags "autoscaler-anywhere" }}
{{- $anywhereAgent := index (index .Values "autoscaler-anywhere") "castai-agent" | default dict }}
{{- $anywhereAdditionalEnv := $anywhereAgent.additionalEnv | default dict }}
{{- if not (index $anywhereAdditionalEnv "ANYWHERE_CLUSTER_NAME") }}
{{ fail "autoscaler-anywhere.castai-agent.additionalEnv.ANYWHERE_CLUSTER_NAME is required when autoscaler-anywhere tag is enabled" }}
{{- end }}
{{- end }}
