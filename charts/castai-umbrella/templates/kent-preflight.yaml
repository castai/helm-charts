{{- $preflight := dig "preflight" dict .Values.kent -}}
{{- if and .Values.kent.enabled (dig "enabled" true $preflight) }}
{{- $podLabels := dig "podLabels" dict $preflight -}}
{{- $podAnnotations := dig "podAnnotations" dict $preflight -}}
{{- $tolerations := concat (default (list) .Values.global.tolerations) (dig "tolerations" (list) $preflight) -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-kent-preflight
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with (dig "serviceAccount" "annotations" dict $preflight) }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-kent-preflight
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kent-preflight
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-kent-preflight
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-kent-preflight
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-kent-preflight
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    {{- if or $podLabels $podAnnotations }}
    metadata:
      {{- with $podLabels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-kent-preflight
      {{- with (dig "imagePullSecrets" (list) $preflight) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (dig "podSecurityContext" dict $preflight) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (dig "priorityClassName" "" $preflight) }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with (dig "nodeSelector" dict $preflight) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (dig "affinity" dict $preflight) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (dig "topologySpreadConstraints" (list) $preflight) }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: preflight
          image: bitnami/kubectl:latest
          {{- with (dig "resources" dict $preflight) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with (dig "containerSecurityContext" dict $preflight) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Checking for Karpenter deployment..."
              if ! kubectl get deployment -l app.kubernetes.io/name=karpenter -A --ignore-not-found \
                | grep -q karpenter; then
                echo "ERROR: No Karpenter deployment found in cluster."
                echo "Install Karpenter before enabling KENT."
                exit 1
              fi
              echo "Karpenter deployment found."

              echo "Checking for Karpenter CRDs..."
              if ! kubectl get crd nodepools.karpenter.sh --ignore-not-found \
                | grep -q nodepools.karpenter.sh; then
                echo "ERROR: CRD nodepools.karpenter.sh not found in cluster."
                echo "Ensure Karpenter CRDs are installed before enabling KENT."
                exit 1
              fi
              echo "Karpenter CRDs found. Proceeding with KENT installation."
{{- end }}
