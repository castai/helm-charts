castai-cluster-controller:
  enabled: true
  castai:
    apiKeySecretRef: castai-credentials
  envFrom:
    - configMapRef:
        name: castai-agent-metadata
  autoscaling:
    enabled: true
  aks:
    enabled: false

castai-evictor:
  enabled: true
  replicaCount: 1
  aggressiveMode: false
  overrideEnvFrom: true
  envFrom:
    - secretRef:
        name: castai-credentials
    - configMapRef:
        name: castai-agent-metadata

castai-pod-mutator:
  enabled: true
  fullnameOverride: castai-pod-mutator
  dependencyCheck:
    enabled: false
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
  envFrom:
    - configMapRef:
        name: castai-agent-metadata

castai-pod-pinner:
  enabled: true
  castai:
    apiKeySecretRef: castai-credentials
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID
  replicaCount: 0

castai-live:
  enabled: true
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
  castai-aws-vpc-cni:
    enabled: false
  daemon:
    labelNodeSubnet: true
  controller:
    replicaCount: 0
