# Mode selection is NOT configured here.
#
# Helm evaluates dependency tags against the ROOT chart's values. Mode tags
# must be set at the umbrella root:
#   --set tags.<mode>=true   (readonly | node-autoscaler | workload-autoscaler | full)
#
# Setting autoscaler.tags.<mode>=true has no effect on component activation
# and bypasses the umbrella's mutual-exclusivity and required-value validation.
#
# Valid upgrade paths (additive, shared resources patched in-place, no restarts):
#   readonly → node-autoscaler
#   readonly → workload-autoscaler
#   node-autoscaler → full
#   workload-autoscaler → full
#
# All other mode transitions require uninstall + reinstall.
#
# Component overrides use the stable autoscaler.* prefix and are preserved
# across all mode upgrades with --reuse-values:
#   --set autoscaler.castai-kvisor.enabled=false

# ── Component defaults ────────────────────────────────────────────────────────
# Do NOT set <component>.enabled here — that would override the tag-based
# activation mechanism. Use --set autoscaler.<component>.enabled=false to
# disable a specific component regardless of mode.

castai-agent:
  replicaCount: 1
  apiKeySecretRef: castai-credentials
  createNamespace: false
  metadataStore:
    createConfigMap: true

castai-spot-handler:
  castai:
    provider: ""
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID
  apiKeySecretRef: castai-credentials

castai-kvisor:
  castai:
    apiKeySecretRef: castai-credentials
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID

gpu-metrics-exporter:
  castai:
    apiKeySecretRef: castai-credentials
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID

castai-cluster-controller:
  castai:
    apiKeySecretRef: castai-credentials
  envFrom:
    - configMapRef:
        name: castai-agent-metadata
  autoscaling:
    enabled: true
  aks:
    enabled: false

castai-evictor:
  replicaCount: 1
  aggressiveMode: false
  overrideEnvFrom: true
  envFrom:
    - secretRef:
        name: castai-credentials
    - configMapRef:
        name: castai-agent-metadata

castai-pod-mutator:
  fullnameOverride: castai-pod-mutator
  dependencyCheck:
    enabled: false
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
  envFrom:
    - configMapRef:
        name: castai-agent-metadata

castai-pod-pinner:
  castai:
    apiKeySecretRef: castai-credentials
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID
  replicaCount: 0

castai-live:
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
  castai-aws-vpc-cni:
    enabled: false
  daemon:
    labelNodeSubnet: true
  controller:
    replicaCount: 0

castai-workload-autoscaler:
  fullnameOverride: castai-workload-autoscaler
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata

castai-workload-autoscaler-exporter:
  fullnameOverride: castai-workload-autoscaler-exporter
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
