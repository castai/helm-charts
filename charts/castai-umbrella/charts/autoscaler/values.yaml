# Default values for the CAST AI Autoscaler profile.
# All components default to disabled except agent and spot-handler.
# Enable additional components via --set <component>.enabled=true.
#
# Provider-specific notes:
#   - global.castai.provider must be set to: eks | aks | gke
#   - spot-handler.castai.provider is derived automatically from global.castai.provider
#     (eks->aws, aks->azure, gke->gcp); override only if decoupling from the global value
#   - cluster-controller.aks.enabled must be set to true on AKS clusters

# ---------------------------------------------------------------------------
# Core — enabled by default
# ---------------------------------------------------------------------------

agent:
  enabled: true
  replicaCount: 1
  apiKeySecretRef: castai-credentials
  createNamespace: false

spot-handler:
  enabled: true
  castai:
    # Override only if you need to decouple from global.castai.provider.
    provider: ""
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID
  apiKeySecretRef: castai-credentials

# ---------------------------------------------------------------------------
# Optional — disabled by default, opt-in via --set
# ---------------------------------------------------------------------------

cluster-controller:
  enabled: false
  castai:
    apiKeySecretRef: castai-credentials
  envFrom:
    - configMapRef:
        name: castai-agent-metadata
  autoscaling:
    enabled: true
  aks:
    # Set to true on AKS clusters.
    enabled: false

workload-autoscaler:
  enabled: false
  fullnameOverride: castai-workload-autoscaler
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata

workload-autoscaler-exporter:
  enabled: false
  fullnameOverride: castai-workload-autoscaler-exporter
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata

evictor:
  enabled: false
  replicaCount: 1
  aggressiveMode: false
  overrideEnvFrom: true
  envFrom:
    - secretRef:
        name: castai-credentials
    - configMapRef:
        name: castai-agent-metadata

pod-mutator:
  enabled: false
  fullnameOverride: castai-pod-mutator
  dependencyCheck:
    enabled: false
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
  envFrom:
    - configMapRef:
        name: castai-agent-metadata

pod-pinner:
  enabled: false
  replicaCount: 0
  castai:
    apiKeySecretRef: castai-credentials
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID

ai-optimizer-proxy:
  enabled: false
  castai:
    apiKeySecretRef: castai-credentials
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID

metrics-server:
  enabled: false

live:
  enabled: false
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
  castai-aws-vpc-cni:
    enabled: false
  daemon:
    labelNodeSubnet: true
  controller:
    replicaCount: 0
