castai-agent:
  enabled: true
  replicaCount: 1
  apiKeySecretRef: ""
  # Currently only EKS is supported
  provider: eks
  # executed for helm to create the namespace `helm --create-namespace`
  createNamespace: false
  metadataStore:
    createConfigMap: true

castai-cluster-controller:
  enabled: true
  castai:
    apiKeySecretRef: ""
  envFrom:
    - configMapRef:
        name: castai-agent-metadata
  autoscaling:
    enabled: false

castai-kentroller:
  enabled: true
  castai:
    apiKeySecretRef: ""
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
    organizationIdConfigMapKeyRef:
      name: castai-agent-metadata

castai-workload-autoscaler:
  enabled: true
  castai:
    apiKeySecretRef: ""
    configMapRef: castai-agent-metadata

castai-workload-autoscaler-exporter:
  enabled: true
  castai:
    apiKeySecretRef: ""
    configMapRef: castai-agent-metadata

# controller.replicaCount: 0 = CLM disabled, 2 = CLM enabled.
castai-live:
  enabled: true
  castai:
    apiKeySecretRef: ""
    configMapRef: castai-agent-metadata
  daemon:
    labelNodeSubnet: true
  controller:
    replicaCount: 0

castai-pod-mutator:
  enabled: true
  dependencyCheck:
    enabled: false
  castai:
    apiKeySecretRef: ""
    configMapRef: castai-agent-metadata
  envFrom:
    - configMapRef:
        name: castai-agent-metadata

castai-spot-handler:
  enabled: true
  apiKeySecretRef: ""
  castai:
    provider: eks
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID

# Disabled by default — most clusters already provide the metrics.k8s.io API.
metrics-server:
  enabled: false

# castai-kvisor with just cluster proxy for OpsPilot debugging
castai-kvisor:
  enabled: true
  castai:
    apiKeySecretRef: ""
    clusterIdConfigMapKeyRef:
      name: castai-agent-metadata
      key: CLUSTER_ID
  agent:
    enabled: false
  controller:
    enabled: true
    extraArgs:
      log-level: info
      cluster-proxy-enabled: "true"

castai-chart-upgrader:
  enabled: false
  chart:
    name: castai
    repository: "https://castai.github.io/helm-charts"
