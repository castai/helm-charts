# Default values for the CAST AI Autoscaler Anywhere profile.
# For non-managed Kubernetes clusters (bare metal, on-prem, edge, etc.).
#
# Cluster name must be provided via:
#   --set autoscaler-anywhere.castai-agent.additionalEnv.ANYWHERE_CLUSTER_NAME=<name>

# ---------------------------------------------------------------------------
# Core
# ---------------------------------------------------------------------------

castai-agent:
  enabled: true
  replicaCount: 2
  provider: anywhere
  apiKeySecretRef: castai-credentials
  createNamespace: false

castai-cluster-controller:
  enabled: true
  castai:
    apiKeySecretRef: castai-credentials
  envFrom:
    - configMapRef:
        name: castai-agent-metadata
  enableTopologySpreadConstraints: true
  autoscaling:
    enabled: true

# ---------------------------------------------------------------------------
# WOOP stack
# ---------------------------------------------------------------------------

castai-workload-autoscaler:
  enabled: true
  fullnameOverride: castai-workload-autoscaler
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata

castai-workload-autoscaler-exporter:
  enabled: true
  fullnameOverride: castai-workload-autoscaler-exporter
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata

castai-evictor:
  enabled: true
  replicaCount: 0
  aggressiveMode: false
  overrideEnvFrom: true
  envFrom:
    - secretRef:
        name: castai-credentials
    - configMapRef:
        name: castai-agent-metadata

# ---------------------------------------------------------------------------
# Pod mutator — enabled by default for anywhere
# ---------------------------------------------------------------------------

castai-pod-mutator:
  enabled: true
  fullnameOverride: castai-pod-mutator
  dependencyCheck:
    enabled: false
  castai:
    apiKeySecretRef: castai-credentials
    configMapRef: castai-agent-metadata
  enableTopologySpreadConstraints: true
  envFrom:
    - configMapRef:
        name: castai-agent-metadata
