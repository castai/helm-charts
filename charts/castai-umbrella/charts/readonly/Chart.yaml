apiVersion: v2
name: readonly
description: CAST AI readonly mode — agent, spot-handler, kvisor, gpu-metrics-exporter.
type: application
version: 0.1.0
dependencies:
  - name: castai-agent
    version: "0.145.0"
    repository: "https://castai.github.io/helm-charts"
    condition: castai-agent.enabled

  - name: castai-spot-handler
    version: "0.32.0"
    repository: "https://castai.github.io/helm-charts"
    condition: castai-spot-handler.enabled

  - name: castai-kvisor
    version: "1.0.131"
    repository: "https://castai.github.io/helm-charts"
    condition: castai-kvisor.enabled

  - name: gpu-metrics-exporter
    version: "0.1.29"
    repository: "https://castai.github.io/helm-charts"
    condition: gpu-metrics-exporter.enabled
