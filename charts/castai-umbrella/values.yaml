global:
  castai:
    apiKey: ""
    # apiKeySecretRef -- Name of a pre-existing Secret containing the CAST AI API key.
    # The secret must have a key named API_KEY. Mutually exclusive with apiKey.
    # Defaults to "castai-credentials" — the secret created by this chart when apiKey is set.
    # Set to a custom name to use a pre-existing secret instead of providing apiKey.
    apiKeySecretRef: "castai-credentials"
    apiURL: "https://api.cast.ai"
    grpcURL: "grpc.cast.ai:443"
    # provider -- Kubernetes service provider: eks, aks, gke, kops, anywhere.
    provider: ""
  # imagePullSecrets -- Image pull secrets applied to all sub-chart pods (merged with per-chart imagePullSecrets).
  imagePullSecrets: []
  # tolerations -- Global tolerations applied to all sub-chart pods (can be overridden per sub-chart).
  tolerations: []
  # registry -- Container registry prefix for all sub-chart images (e.g. "my-registry.example.com").
  # When set, it is prepended to all image repositories in sub-charts that support it.
  registry: ""

kent:
  enabled: false
  # Kent is a wrapper profile. Values under kent.<component> are passed through
  # to the matching child chart; empty resources and containerSecurityContext maps
  # are intentional override points for clusters with strict admission policies.
  preflight:
    enabled: true
    resources: {}
    containerSecurityContext: {}
  castai-agent:
    clusterVPA:
      # Disable when admission policies require CPU and memory requests/limits on every container.
      enabled: true
      resources: {}
    resources: {}
    monitor:
      resources: {}
    containerSecurityContext: {}
  castai-cluster-controller:
    resources: {}
    monitor:
      resources: {}
    containerSecurityContext: {}
  castai-workload-autoscaler:
    containerSecurityContext: {}
  castai-workload-autoscaler-exporter:
    containerSecurityContext: {}
    prometheus:
      containerSecurityContext: {}
  castai-pod-mutator:
    containerSecurityContext: {}
  castai-kvisor:
    agent:
      containerSecurityContext: {}
      reliabilityMetrics:
        obi:
          containerSecurityContext: {}
    controller:
      containerSecurityContext: {}

# tags -- Profile mode selection (mutually exclusive — pick one).
# Component overrides are stable across all mode upgrades with --reuse-values:
#   --set autoscaler.castai-kvisor.enabled=false
tags:
  autoscaler-anywhere: false
  autoscaler-openshift: false
  readonly: false
  node-autoscaler: false
  workload-autoscaler: false
  full: false

autoscaler: {}

# extraObjects -- List of extra Kubernetes objects to render with the chart.
# Useful for deploying supporting resources such as ExternalSecrets alongside the umbrella.
# Each item must be a valid Kubernetes manifest (apiVersion, kind, metadata, spec).
extraObjects: []
