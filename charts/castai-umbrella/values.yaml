global:
  castai:
    apiKey: ""
    apiURL: "https://api.cast.ai"
    grpcURL: "grpc.cast.ai:443"
    # provider -- Kubernetes service provider: eks, aks, gke, kops, anywhere.
    provider: ""

kent:
  enabled: false
  preflight:
    enabled: true


# tags -- Enable a product mode (mutually exclusive — pick one).
#
# Valid upgrade paths (additive, shared resources patched in-place, no restarts):
#   readonly → node-autoscaler
#   readonly → workload-autoscaler
#   node-autoscaler → full
#   workload-autoscaler → full
#
# autoscaler-anywhere is standalone — no migration paths to/from other modes.
# All other mode transitions require uninstall + reinstall.
tags:
  readonly: false
  node-autoscaler: false
  workload-autoscaler: false
  full: false
  autoscaler-anywhere: false
