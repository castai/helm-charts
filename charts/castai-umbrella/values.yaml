global:
  castai:
    apiKey: ""
    apiURL: "https://api.cast.ai"
    grpcURL: "grpc.cast.ai:443"
    # provider -- Kubernetes service provider: eks, aks, gke, kops, anywhere.
    provider: ""

kent:
  enabled: false

autoscaler-anywhere:
  enabled: false

# tags -- Enable a product tier.
# tags.readonly=true  → enables readonly sub-chart (agent, spot-handler, kvisor, gpu-metrics-exporter)
# tags.autoscaler=true → enables readonly + autoscaler sub-charts (adds cluster-controller, evictor, pod-mutator, pod-pinner, castai-live)
tags:
  readonly: false
  autoscaler: false
