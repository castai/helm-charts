global:
  castai:
    apiKey: ""
    # apiKeySecretRef -- Name of a pre-existing Secret containing the CAST AI API key.
    # The secret must have a key named API_KEY. Mutually exclusive with apiKey.
    apiKeySecretRef: ""
    apiURL: "https://api.cast.ai"
    grpcURL: "grpc.cast.ai:443"
    # provider -- Kubernetes service provider: eks, aks, gke, kops, anywhere.
    provider: ""
  # tolerations -- Global tolerations applied to all sub-chart pods (can be overridden per sub-chart).
  tolerations: []
  # registry -- Container registry prefix for all sub-chart images (e.g. "my-registry.example.com").
  # When set, it is prepended to all image repositories in sub-charts that support it.
  registry: ""

kent:
  enabled: false
  preflight:
    enabled: true

# tags -- Profile mode selection (mutually exclusive — pick one).
# When castai-cluster-agent is true, all other mode tags must be false (and vice versa).
# Mode tags (readonly, node-autoscaler, workload-autoscaler, full) are passed through to
# the castai-cluster-agent sub-chart and control which components are enabled within it.
#
# Component overrides with autoscaler sub-chart:
#   --set autoscaler.castai-kvisor.enabled=false
# Component overrides with castai-cluster-agent sub-chart:
#   --set castai-cluster-agent.castai-kvisor.enabled=false
tags:
  autoscaler-anywhere: false
  autoscaler-openshift: false
  readonly: false
  node-autoscaler: false
  workload-autoscaler: false
  full: false
  # castai-cluster-agent -- Enable the unified cluster-agent chart.
  # Mutually exclusive with all other mode tags.
  castai-cluster-agent: false

autoscaler: {}

# extraObjects -- List of extra Kubernetes objects to render with the chart.
# Useful for deploying supporting resources such as ExternalSecrets alongside the umbrella.
# Each item must be a valid Kubernetes manifest (apiVersion, kind, metadata, spec).
extraObjects: []
