apiVersion: v2
name: castai
description: Umbrella chart for CAST AI components.
type: application
version: 0.32.3
dependencies:
  # ── Legacy profile sub-charts ─────────────────────────────────────────────────
  - name: kent
    version: "*"
    repository: "file://charts/kent"
    condition: kent.enabled
  - name: autoscaler-anywhere
    version: "*"
    repository: "file://charts/autoscaler-anywhere"
    tags:
      - autoscaler-anywhere
  - name: autoscaler-openshift
    version: "*"
    repository: "file://charts/autoscaler-openshift"
    tags:
      - autoscaler-openshift
  # ── Autoscaler mode sub-chart ─────────────────────────────────────────────────
  # A single sub-chart containing all mode components. Mode selection is controlled
  # via tags.<mode>=true (readonly, node-autoscaler, workload-autoscaler, full —
  # mutually exclusive).
  #
  # Component overrides use the stable autoscaler.* prefix across all mode upgrades:
  #   --set autoscaler.castai-kvisor.enabled=false
  #
  # Usage:
  #   helm upgrade -i castai castai-helm/castai -n castai-agent --create-namespace \
  #     --set global.castai.apiKey=<KEY> \
  #     --set global.castai.provider=<eks|aks|gke> \
  #     --set tags.<mode>=true
  - name: autoscaler
    version: "*"
    repository: "file://charts/autoscaler"
