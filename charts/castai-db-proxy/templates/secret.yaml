{{- if .Values.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "castai-db-proxy.name" . }}
  labels:
    {{- include "castai-db-proxy.labels" . | nindent 4 }}
  annotations:
    {{- include "castai-db-proxy.annotations" . | nindent 4 }}
data:
  API_KEY: {{ .Values.apiKey | b64enc | quote }}
{{- end }}
