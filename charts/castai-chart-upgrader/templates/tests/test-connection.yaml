---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "chart-upgrader.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart-upgrader.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ include "chart-upgrader.serviceAccountName" . }}
  automountServiceAccountToken: true
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: helm
    image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    imagePullPolicy: {{ .Values.image.pullPolicy }}
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    env:
    - name: HOME
      value: /tmp
    - name: HELM_CACHE_HOME
      value: /tmp/helm/cache
    - name: HELM_CONFIG_HOME
      value: /tmp/helm/config
    - name: HELM_DATA_HOME
      value: /tmp/helm/data
    volumeMounts:
    - name: tmp
      mountPath: /tmp
    command:
    - /bin/sh
    - -c
    - |
      set -eu
      kubectl version --client
      helm version
      helm list --namespace {{ .Release.Namespace }}
      echo "All tests passed!"
  volumes:
  - name: tmp
    emptyDir: {}
