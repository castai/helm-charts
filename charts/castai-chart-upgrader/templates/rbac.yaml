{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chart-upgrader.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "chart-upgrader.labels" . | nindent 4 }}
{{- end }}
{{- if .Values.rbac.create }}
---
# Cluster-admin equivalent. The chart-upgrader must be able to install/upgrade
# arbitrary Helm charts, which may declare any resource type with any verb.
# If this is not acceptable, one can set .Values.serviceAccount.create to false
# and provide any other service account.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart-upgrader.serviceAccountName" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "chart-upgrader.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chart-upgrader.serviceAccountName" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "chart-upgrader.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chart-upgrader.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "chart-upgrader.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
