apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: gpurecommendations.autoscaling.cast.ai
spec:
  group: autoscaling.cast.ai
  names:
    kind: GpuRecommendation
    listKind: GpuRecommendationList
    plural: gpurecommendations
    singular: gpurecommendation
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: GpuRecommendation is the Schema for the gpurecommendations API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GpuRecommendationSpec defines the desired state of GpuRecommendation.
            properties:
              applyMode:
                description: ApplyMode defines when the recommendation is applied.
                enum:
                - deferred
                type: string
              containersGrouping:
                description: ContainersGrouping defines rules for grouping containers.
                items:
                  properties:
                    into:
                      description: The target container name into which matching containers
                        should be grouped
                      type: string
                    key:
                      description: The attribute used to match containers. `name`
                        refers to container name property
                      enum:
                      - name
                      type: string
                    operator:
                      description: Defines how the 'key' is evaluated against the
                        'values' list
                      enum:
                      - contains
                      type: string
                    values:
                      description: A list of string values used for matching against
                        the 'key' with the specified operator
                      items:
                        type: string
                      minItems: 1
                      type: array
                  required:
                  - into
                  - key
                  - operator
                  - values
                  type: object
                type: array
              recommendation:
                description: Recommendation is the list of per-container GPU adjustments.
                items:
                  description: GpuContainerAdjustments represents the GPU adjustments
                    for a single container.
                  properties:
                    containerName:
                      description: ContainerName is the target container for these
                        GPU requests.
                      type: string
                    requests:
                      description: Requests is the list of GPU requests for this container.
                      items:
                        description: GpuRequest defines a single GPU request.
                        properties:
                          count:
                            default: 1
                            description: Count is the number of GPUs requested.
                            format: int32
                            minimum: 1
                            type: integer
                          deviceClassName:
                            description: DeviceClassName is the DRA device class (e.g.
                              "gpu.nvidia.com").
                            type: string
                          name:
                            description: Name is a unique identifier for this GPU
                              request within the recommendation.
                            type: string
                          productName:
                            description: ProductName is the GPU product name as reported
                              by the device driver (e.g. "NVIDIA A100-SXM4-80GB",
                              "Tesla T4").
                            type: string
                          selectors:
                            description: Selectors are CEL expression selectors for
                              device matching.
                            items:
                              description: DeviceSelector wraps a CEL expression for
                                device matching.
                              properties:
                                cel:
                                  description: CEL contains the CEL expression selector.
                                  properties:
                                    expression:
                                      description: Expression is a CEL expression
                                        evaluated against device attributes.
                                      type: string
                                  required:
                                  - expression
                                  type: object
                              required:
                              - cel
                              type: object
                            type: array
                          sharing:
                            description: |-
                              Sharing defines optional GPU sharing configuration.
                              When nil, each pod gets a dedicated GPU.
                            properties:
                              strategy:
                                description: Strategy defines the sharing strategy.
                                enum:
                                - TimeSlicing
                                type: string
                              timeSlicing:
                                description: |-
                                  TimeSlicing is the configuration for time-slicing sharing.
                                  Required when strategy is TimeSlicing.
                                properties:
                                  interval:
                                    description: Interval defines the scheduling interval.
                                    enum:
                                    - Default
                                    - Short
                                    - Medium
                                    - Long
                                    type: string
                                  resources:
                                    description: Resources defines the capacity dimensions
                                      for time-slicing.
                                    properties:
                                      memory:
                                        anyOf:
                                        - type: integer
                                        - type: string
                                        description: Memory is the actual GPU memory
                                          needed (e.g. "10Gi").
                                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                        x-kubernetes-int-or-string: true
                                      totalMemory:
                                        anyOf:
                                        - type: integer
                                        - type: string
                                        description: TotalMemory is the total GPU
                                          memory for model targeting.
                                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                        x-kubernetes-int-or-string: true
                                      utilization:
                                        anyOf:
                                        - type: integer
                                        - type: string
                                        description: Utilization is the fraction of
                                          SM active time (e.g. "0.25").
                                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                        x-kubernetes-int-or-string: true
                                    required:
                                    - memory
                                    - utilization
                                    type: object
                                required:
                                - interval
                                - resources
                                type: object
                            required:
                            - strategy
                            type: object
                        required:
                        - count
                        - deviceClassName
                        - name
                        type: object
                      minItems: 1
                      type: array
                  required:
                  - containerName
                  - requests
                  type: object
                minItems: 1
                type: array
              targetRef:
                description: TargetRef points to the workload this recommendation
                  applies to.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - applyMode
            - recommendation
            - targetRef
            type: object
          status:
            description: GpuRecommendationStatus defines the observed state of GpuRecommendation.
            properties:
              blockedClaims:
                description: BlockedClaims lists ResourceClaims that caused scheduling
                  failures and should be avoided.
                items:
                  description: BlockedClaim records a ResourceClaim that should not
                    be assigned to new pods.
                  properties:
                    blockedAt:
                      description: BlockedAt is the time the claim was blocked. Used
                        for TTL-based expiry.
                      format: date-time
                      type: string
                    name:
                      description: Name of the ResourceClaim.
                      type: string
                    reason:
                      description: Human-readable reason for blocking.
                      type: string
                  required:
                  - blockedAt
                  - name
                  - reason
                  type: object
                type: array
              conditions:
                description: Conditions represent the latest available observations
                  of the recommendation's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    selectableFields:
    - jsonPath: .spec.targetRef.kind
    - jsonPath: .spec.targetRef.name
    served: true
    storage: true
    subresources:
      status: {}
