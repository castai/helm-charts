{{- if and .Values.router.enabled .Values.router.serviceDiscovery.enabled }}
{{- /*
RBAC for the cache-aware router's Kubernetes service-discovery: it must be able to
get/list/watch pods to discover worker replicas by label and track add/remove live.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sglang.router.fullname" . }}
  labels:
    {{- include "sglang.router.labels" . | nindent 4 }}
  {{- if .Values.router.syncWaves.enabled }}
  {{- /* RBAC before the router pod (which needs the SA to watch pods), which is
     before the Service selector flip. Wave: rbac < router < service. */}}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.router.syncWaves.rbac | quote }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sglang.router.fullname" . }}
  labels:
    {{- include "sglang.router.labels" . | nindent 4 }}
  {{- if .Values.router.syncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.router.syncWaves.rbac | quote }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sglang.router.fullname" . }}
  labels:
    {{- include "sglang.router.labels" . | nindent 4 }}
  {{- if .Values.router.syncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.router.syncWaves.rbac | quote }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sglang.router.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sglang.router.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
