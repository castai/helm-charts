{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "castai-kentroller.fullname" . }}-webhook
  labels:
    {{- include "castai-kentroller.labels" . | nindent 4 }}
spec:
  ports:
    - name: webhook
      port: 443
      targetPort: 9443
      protocol: TCP
  selector:
    {{- include "castai-kentroller.selectorLabels" . | nindent 4 }}
{{- end }}
