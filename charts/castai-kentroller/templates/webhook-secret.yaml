{{- if .Values.webhook.enabled }}
# Empty placeholder Secret. cert-controller (running inside the kentroller pod
# via setupCertRotator) populates and rotates the TLS material here. The pod
# does not mount this Secret directly — the rotator writes the certs to an
# emptyDir at $CERT_ROTATOR_CERT_DIR — but the Secret must exist (or be
# creatable) so that all replicas converge on the same CA across restarts.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "castai-kentroller.webhookCertsSecretName" . }}
  labels:
    {{- include "castai-kentroller.labels" . | nindent 4 }}
{{- end }}
