{{- if and .Values.metrics.enabled .Values.metrics.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "castai-kentroller.fullname" . }}-metric-svc
  labels:
    {{- include "castai-kentroller.labels" . | nindent 4 }}
spec:
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      protocol: TCP
      targetPort: {{ .Values.metrics.port }}
  selector:
      {{- include "castai-kentroller.selectorLabels" . | nindent 6 }}
{{- end }}
