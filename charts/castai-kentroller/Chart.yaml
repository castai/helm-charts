apiVersion: v2
name: castai-kentroller
description: Deploys the CAST AI kentroller — the in-cluster controller for KENT (Karpenter Enterprise by CAST AI), responsible for automated Kubernetes cluster management.
type: application
# version & appVersion are set to a kentroller/{tagValue} (gitlab/remote-release-template.yml > chart_version_from_tag.py)
version: 0.1.175
appVersion: "v0.1.175"
dependencies:
  - name: castai-kentroller-crds
    version: "0.0.1"
    repository: "file://dependencies/crds"
    condition: crds.enabled
