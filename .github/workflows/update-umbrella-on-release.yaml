name: Update Umbrella Chart on Child Release

on:
  release:
    types:
      - published

jobs:
  update-umbrella:
    runs-on: ubuntu-latest
    steps:
      - name: Parse chart name and version from tag
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Tags are in the format: <chart-name>-<semver>, e.g. castai-agent-0.115.0
          # Extract version: last segment matching x.y.z
          VERSION=$(echo "$TAG" | grep -oP '\d+\.\d+\.\d+$' || true)
          if [ -z "$VERSION" ]; then
            echo "Tag '${TAG}' does not match expected <chart-name>-x.y.z format, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHART_NAME="${TAG%-${VERSION}}"
          echo "chart_name=${CHART_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Parsed chart: ${CHART_NAME}, version: ${VERSION}"

      - name: Checkout
        if: steps.parse.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_CICD }}

      - name: Configure Git
        if: steps.parse.outputs.skip != 'true'
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install yq
        if: steps.parse.outputs.skip != 'true'
        uses: mikefarah/yq@v4.44.3

      - name: Update umbrella subchart dependencies
        if: steps.parse.outputs.skip != 'true'
        id: update
        run: |
          CHART_NAME="${{ steps.parse.outputs.chart_name }}"
          VERSION="${{ steps.parse.outputs.version }}"
          CHANGED=false

          SUBCHART_FILES=(
            "charts/castai-umbrella/charts/autoscaler/Chart.yaml"
            "charts/castai-umbrella/charts/kent/Chart.yaml"
          )

          for CHART_FILE in "${SUBCHART_FILES[@]}"; do
            # Check if this subchart has the released chart as a dependency
            if yq ".dependencies[].name" "$CHART_FILE" | grep -qx "$CHART_NAME"; then
              CURRENT=$(yq ".dependencies[] | select(.name == \"$CHART_NAME\") | .version" "$CHART_FILE")
              echo "Updating ${CHART_NAME} in ${CHART_FILE}: ${CURRENT} -> ${VERSION}"
              yq -i "(.dependencies[] | select(.name == \"$CHART_NAME\") | .version) = \"${VERSION}\"" "$CHART_FILE"
              CHANGED=true
            fi
          done

          if [ "$CHANGED" == "false" ]; then
            echo "${CHART_NAME} is not a dependency of any umbrella subchart, skipping."
          fi
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT

      - name: Bump umbrella chart version
        if: steps.update.outputs.changed == 'true'
        run: |
          CHART_FILE="charts/castai-umbrella/Chart.yaml"
          CURRENT=$(yq ".version" "$CHART_FILE")
          # Increment patch version
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          yq -i ".version = \"${NEW_VERSION}\"" "$CHART_FILE"
          echo "Bumped castai-umbrella version: ${CURRENT} -> ${NEW_VERSION}"

      - name: Commit and push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          CHART_NAME="${{ steps.parse.outputs.chart_name }}"
          VERSION="${{ steps.parse.outputs.version }}"
          git add charts/castai-umbrella/
          git commit -m "[castai-umbrella] bump ${CHART_NAME} to v.${VERSION}"
          git push
