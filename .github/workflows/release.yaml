name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # We need to manually add repos for deps due to bug in https://github.com/helm/chart-releaser/issues/135
      - name: Add dependencies
        run: |
          helm repo add vector https://helm.vector.dev
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add incubator https://charts.helm.sh/incubator
          helm repo add elasticsearch https://helm.elastic.co
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add castai-helm https://castai.github.io/helm-charts
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/

      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.17.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Update umbrella subchart dependencies
        run: |
          helm dependency update charts/castai-umbrella/charts/kent
          helm dependency update charts/castai-umbrella/charts/readonly
          helm dependency update charts/castai-umbrella/charts/node-autoscaler
          helm dependency update charts/castai-umbrella/charts/workload-autoscaler
          helm dependency update charts/castai-umbrella/charts/full
          helm dependency update charts/castai-umbrella/charts/autoscaler-anywhere

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@6203d709ca237fb26b724837f2c53716f244ee8c
        with:
          charts_dir: charts
          config: cr.yaml
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.PAT_CICD }}"

      - name: Release evictor child charts
        uses: helm/chart-releaser-action@6203d709ca237fb26b724837f2c53716f244ee8c
        with:
          charts_dir: charts/castai-evictor/child-charts
          config: cr.yaml
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.PAT_CICD }}"

      - name: Release cluster-controller child charts
        uses: helm/chart-releaser-action@6203d709ca237fb26b724837f2c53716f244ee8c
        with:
          charts_dir: charts/castai-cluster-controller/child-charts
          config: cr.yaml
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.PAT_CICD }}"

      - name: Release pod pinner child charts
        uses: helm/chart-releaser-action@6203d709ca237fb26b724837f2c53716f244ee8c
        with:
          charts_dir: charts/castai-pod-pinner/child-charts
          config: cr.yaml
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.PAT_CICD }}"

  update-umbrella:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_CICD }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update umbrella subchart dependencies
        id: update
        run: |
          CHANGED=false
          BUMP_SUMMARY=""

          SUBCHART_FILES=(
            "charts/castai-umbrella/charts/kent/Chart.yaml"
            "charts/castai-umbrella/charts/readonly/Chart.yaml"
            "charts/castai-umbrella/charts/node-autoscaler/Chart.yaml"
            "charts/castai-umbrella/charts/workload-autoscaler/Chart.yaml"
            "charts/castai-umbrella/charts/full/Chart.yaml"
          )

          # Find charts whose Chart.yaml version changed in this push
          CHANGED_CHARTS=$(git diff ${{ github.event.before }} ${{ github.sha }} -- 'charts/*/Chart.yaml' | grep '^+++ b/' | sed 's|+++ b/||')

          for CHART_FILE in $CHANGED_CHARTS; do
            CHART_NAME=$(yq ".name" "$CHART_FILE")
            VERSION=$(yq ".version" "$CHART_FILE")
            echo "Detected changed chart: ${CHART_NAME} @ ${VERSION}"

            for SUBCHART_FILE in "${SUBCHART_FILES[@]}"; do
              if yq ".dependencies[].name" "$SUBCHART_FILE" | grep -qx "$CHART_NAME"; then
                CURRENT=$(yq ".dependencies[] | select(.name == \"$CHART_NAME\") | .version" "$SUBCHART_FILE")
                if [ "$CURRENT" != "$VERSION" ]; then
                  echo "Updating ${CHART_NAME} in ${SUBCHART_FILE}: ${CURRENT} -> ${VERSION}"
                  yq -i "(.dependencies[] | select(.name == \"$CHART_NAME\") | .version) = \"${VERSION}\"" "$SUBCHART_FILE"
                  CHANGED=true
                  BUMP_SUMMARY="${BUMP_SUMMARY:+$BUMP_SUMMARY, }${CHART_NAME} to v.${VERSION}"
                fi
              fi
            done
          done

          if [ "$CHANGED" == "false" ]; then
            echo "No umbrella subchart dependencies need updating."
          fi
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "bump_summary=${BUMP_SUMMARY}" >> $GITHUB_OUTPUT

      - name: Bump umbrella chart version
        if: steps.update.outputs.changed == 'true'
        run: |
          CHART_FILE="charts/castai-umbrella/Chart.yaml"
          CURRENT=$(yq ".version" "$CHART_FILE")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          yq -i ".version = \"${NEW_VERSION}\"" "$CHART_FILE"
          echo "Bumped castai-umbrella version: ${CURRENT} -> ${NEW_VERSION}"

      - name: Commit and push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git add charts/castai-umbrella/
          git commit -m "[castai-umbrella] bump ${{ steps.update.outputs.bump_summary }}"
          git push
