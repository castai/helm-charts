name: Update Umbrella Chart on Child Release

on:
  release:
    types:
      - published

jobs:
  wait-for-release:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.parse.outputs.skip }}
      chart_name: ${{ steps.parse.outputs.chart_name }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse chart name and version from tag
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Tags are in the format: <chart-name>-<semver>, e.g. castai-agent-0.115.0
          # Extract version: last segment matching x.y.z
          VERSION=$(echo "$TAG" | grep -oP '\d+\.\d+\.\d+$' || true)
          if [ -z "$VERSION" ]; then
            echo "Tag '${TAG}' does not match expected <chart-name>-x.y.z format, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHART_NAME="${TAG%-${VERSION}}"
          if [ "$CHART_NAME" == "castai" ]; then
            echo "Tag '${TAG}' is the umbrella chart itself, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "chart_name=${CHART_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Parsed chart: ${CHART_NAME}, version: ${VERSION}"

      - name: Wait for Release Charts workflow to complete
        if: steps.parse.outputs.skip != 'true'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: main
          check-name: release
          repo-token: ${{ secrets.PAT_CICD }}
          wait-interval: 30
          allowed-conclusions: success

  update-umbrella:
    needs: wait-for-release
    if: needs.wait-for-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_CICD }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update umbrella subchart dependencies and bump version
        id: update
        run: |
          CHART_NAME="${{ needs.wait-for-release.outputs.chart_name }}"
          VERSION="${{ needs.wait-for-release.outputs.version }}"
          OUTPUT=$(.github/scripts/update-umbrella.sh "$CHART_NAME" "$VERSION" ".")
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "^CHANGED=true"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          CHART_NAME="${{ needs.wait-for-release.outputs.chart_name }}"
          VERSION="${{ needs.wait-for-release.outputs.version }}"
          git add charts/castai-umbrella/
          git commit -m "[castai-umbrella] bump ${CHART_NAME} to v.${VERSION}"
          git push
