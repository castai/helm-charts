name: Lint and Test Charts

on: pull_request

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.17.0

      # Python is required because `ct lint` runs Yamale (https://github.com/23andMe/Yamale) and
      # yamllint (https://github.com/adrienverge/yamllint) which require Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Scan repo with kube-linter
        uses: stackrox/kube-linter-action@v1.0.7
        with:
          directory: charts
          config: kube-linter-config.yaml
          format: plain
          version: v0.6.7

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: ct lint --debug --config ct.yaml

      - name: Check for merge conflict markers
        uses: olivernybroe/action-conflict-finder@v4.1

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          config: kind.yaml
        if: steps.list-changed.outputs.changed == 'true'

      - name: Create mock API
        id: need_mock
        run: |
          charts=$(ct list-changed --config ct.yaml)
          needs_mock=false
          mock_file=""
          while IFS= read -r c; do
            [ -z "$c" ] && continue
            if [ -f "$c/ci/mocks.yaml" ]; then
              needs_mock=true
              mock_file="$c/ci/mocks.yaml"
              break
            fi
          done <<< "$charts"
          if [ "$needs_mock" = "true" ]; then
            echo "needs_mock=true" >> $GITHUB_OUTPUT
            echo "mock_path=$mock_file" >> $GITHUB_OUTPUT
          fi

      - name: Deploy chart-local mock API
        if: steps.list-changed.outputs.changed == 'true' && steps.need_mock.outputs.needs_mock == 'true'
        run: |
          kubectl apply -f "${{ steps.need_mock.outputs.mock_path }}"

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
